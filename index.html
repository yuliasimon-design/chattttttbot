<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Jufan Huang | AI 應用解決方案設計師</title>
    <style>
        /* 基礎風格設定 */
        body {
            background-color: #0a192f; /* 深藍色背景 */
            color: #ffffff; /* 白色文字 */
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .highlight {
            color: #ff8c00; /* 橘色強調色 */
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        /* 核心能力區塊暫代 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1 row);
            gap: 20px;
            margin-top: 50px;
        }
        .card {
            border: 1px solid #233554;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover {
            border-color: #ff8c00;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>黃如璠 <span class="highlight">Jufan Huang</span></h1>
        <p>AI 應用解決方案設計師 × 行銷企劃</p>
        
        <div class="grid">
            <div class="card" onclick="startChat()">
                <h3>AI 產品願景與藍圖規劃 🎯</h3>
                <p>(點擊體驗 AI Agent 對話)</p>
            </div>
            </div>
    </div>

    <script>
        function startChat() {
            alert("對話視窗即將啟動！(這是我們接下來要寫的 JS 邏輯)");
        }
    </script>
</body>
</html>
