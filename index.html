<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jufan Huang | AI Solution Designer</title>
    <style>
        :root {
            /* 調整後的專業深灰配色方案 */
            --bg-dark: #1a1a1a;        /* 極深灰背景 */
            --card-gray: #2d2d2d;      /* 卡片深灰色 */
            --coral: #FF784F;          /* 主強調色 */
            --clay: #DB9D47;           /* 副強調色 */
            --mint: #EDFFD9;           /* 內容文字色 */
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: "PingFang TC", sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            scroll-behavior: smooth;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .highlight { color: var(--coral); }

        /* Bento Grid 佈局 */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 160px;
            gap: 20px;
            max-width: 1000px; width: 100%;
        }

        .card {
            background: var(--card-gray);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer; display: flex; flex-direction: column; justify-content: center;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--coral);
            background: #363636;
        }

        .card.featured {
            grid-column: span 2; grid-row: span 2;
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border-bottom: 4px solid var(--coral);
        }

        .card h3 { margin: 0 0 10px 0; color: var(--clay); font-size: 1.1rem; }
        .card.featured h3 { font-size: 1.8rem; color: var(--coral); }
        .card p { color: var(--mint); opacity: 0.8; font-size: 0.9rem; margin: 0; }

        /* 詳情面板 */
        #detail-panel {
            margin-top: 30px; width: 100%; max-width: 1000px;
            display: none; animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-box {
            background: #ffffff; color: #333;
            border-radius: 20px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Chatbot 模擬樣式 */
        .chat-ui { border: 1px solid #eee; border-radius: 15px; padding: 20px; max-width: 400px; margin: 0 auto; }
        .msg { margin-bottom: 15px; display: flex; }
        .msg.bot .bubble { background: #f0f0f0; border-radius: 15px 15px 15px 2px; }
        .msg.user .bubble { background: var(--coral); color: white; margin-left: auto; border-radius: 15px 15px 2px 15px; }
        .bubble { padding: 10px 15px; font-size: 14px; max-width: 85%; }
        .opt-btn { 
            display: inline-block; padding: 8px 16px; border: 1px solid var(--coral); 
            color: var(--coral); border-radius: 20px; margin-top: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>黃如璠 <span class="highlight">Jufan Huang</span></h1>
        <p style="color:var(--clay)">AI Solution Designer × Marketing Strategist</p>
    </div>

    <div class="bento-grid">
        <div class="card featured" onclick="show('chat')">
            <h3>AI 產品願景與藍圖規劃 🎯</h3>
            <p>點擊體驗：從 0 到 1 的「家用淨水器 Agent」對話邏輯展示。</p>
        </div>
        <div class="card" onclick="show('ux')"><h3>用戶體驗架構 🧠</h3><p>直覺、流暢的對話設計。</p></div>
        <div class="card" onclick="show('biz')"><h3>商業需求洞察 📈</h3><p>精準拆解痛點，轉化提案。</p></div>
        <div class="card" onclick="show('data')"><h3>數據驅動優化 📊</h3><p>持續迭代，提升產品效能。</p></div>
        <div class="card" onclick="show('growth')"><h3>整合行銷增長 📈</h3><p>驅動品牌持續影響力。</p></div>
        <div class="card" onclick="show('e2e')"><h3>端對端專案推進 🚀</h3><p>確保專案完美落地執行。</p></div>
    </div>

    <div id="detail-panel">
        <div id="inner" class="detail-box"></div>
    </div>

    <script>
        const info = {
            chat: `
                <h2 style="color:var(--coral);text-align:center">Agent 對話實測展示</h2>
                <div class="chat-ui">
                    <div class="msg bot"><div class="bubble">嗨～我是智能助理，有任何問題都能問我喔！</div></div>
                    <div class="msg user"><div class="bubble">我家是安裝你們的家用淨水器，想請問濾芯多久要換一次？</div></div>
                    <div class="msg bot"><div class="bubble">您好！建議每 6 個月更換一次以確保過濾效果喔！💧<br><br>您使用的是【極淨系列 A1】嗎？現在濾芯 3 入組有首購優惠 $450，要幫您確認庫存嗎？</div></div>
                    <div class="opt-btn" onclick="alert('已為您跳轉結帳頁面！')">我要購買</div>
                    <div class="opt-btn" onclick="alert('沒問題，若有需要隨時找我！')">這次不用</div>
                </div>
            `,
            ux: `<h2>用戶體驗架構 🧠</h2><ul><li><b>Persona 設定：</b> 建立具備品牌溫度的對話語氣。</li><li><b>Fallback 機制：</b> 確保 AI 無法回答時能優雅引導至真人或知識庫。</li></ul>`,
            biz: `<h2>商業需求洞察 📈</h2><ul><li><b>需求轉化：</b> 將模糊的業務痛點拆解為具體 AI 功能需求。</li><li><b>效益評估：</b> 預估導入後可降低的營運成本與提升的轉化率。</li></ul>`,
            data: `<h2>數據驅動優化 📊</h2><ul><li><b>日誌分析：</b> 定期檢視對話 Log，找出用戶流失的關鍵節點。</li><li><b>漏斗優化：</b> 針對完成率較低的流程進行 A/B Testing。</li></ul>`,
            growth: `<h2>整合行銷增長 📈</h2><ul><li><b>流量閉環：</b> 串聯廣告、社群與 Chatbot，達成自動化行銷。</li><li><b>口碑操作：</b> 運用 KOL 合作與內容行銷帶動品牌聲量。</li></ul>`,
            e2e: `<h2>端對端專案推進 🚀</h2><ul><li><b>跨維度溝通：</b> 橋接工程開發、UI/UX 設計與業務端目標。</li><li><b>全生命週期管理：</b> 從需求、提案、開發到上線後的運營與維護。</li></ul>`
        };

        function show(key) {
            const panel = document.getElementById('detail-panel');
            document.getElementById('inner').innerHTML = info[key];
            panel.style.display = 'block';
            setTimeout(() => { panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
    </script>
</body>
</html>
