<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jufan Huang | AI Solution Designer</title>
    <style>
        :root {
            /* 配色方案調整 */
            --bg-dark: #121212;        /* 極深灰背景 */
            --card-gray: #1e1e1e;      /* 卡片深灰色 */
            --coral: #FF784F;          /* 主強調色 */
            --clay: #DB9D47;           /* 副強調色 */
            --mint: #EDFFD9;           /* 內容文字色 */
            --text-white: #ffffff;
            --border-light: #EEEEEE;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
            scroll-behavior: smooth;
        }

        /* --- 標題欄位優化 (加入 Resume 按鈕) --- */
        .header { 
            display: flex; 
            justify-content: space-between; /* 名字在左，按鈕在右 */
            align-items: center; 
            max-width: 1000px; width: 100%; 
            margin-bottom: 50px; 
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-left h1 { margin: 0; font-size: 2rem; }
        .highlight { color: var(--coral); }
        .subtitle { color: var(--clay); margin: 5px 0 0 0; }

        /* Resume 按鈕樣式 */
        .resume-btn-link {
            text-decoration: none; /* 移除連結下底線 */
        }
        .header-resume-btn {
            background-color: transparent;
            border: 2px solid var(--coral);
            color: var(--coral);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .header-resume-btn:hover {
            background-color: var(--coral);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 120, 79, 0.3);
        }

        /* Bento Grid 佈局 */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 160px;
            gap: 20px;
            max-width: 1000px; width: 100%;
        }

        .card {
            background: var(--card-gray);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; display: flex; flex-direction: column; justify-content: center;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--coral);
            background: #282828;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card.featured {
            grid-column: span 2; grid-row: span 2;
            background: linear-gradient(145deg, #2d2d2d, #1a1a1a);
            border-bottom: 4px solid var(--coral);
        }

        .card h3 { margin: 0 0 10px 0; color: var(--clay); font-size: 1.1rem; }
        .card.featured h3 { font-size: 1.8rem; color: var(--coral); }
        .card p { color: var(--mint); opacity: 0.8; font-size: 0.9rem; margin: 0; line-height: 1.5; }

        /* 詳情面板 */
        #detail-panel {
            margin-top: 30px; width: 100%; max-width: 1000px;
            display: none; animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-box {
            background: #ffffff; color: #333;
            border-radius: 20px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- 互動式 Chatbot 樣式 --- */
        .chat-ui { 
            border: 1px solid #eee; border-radius: 15px; 
            display: flex; flex-direction: column;
            height: 500px; max-width: 500px; margin: 0 auto;
            overflow: hidden;
        }

        #chat-flow {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }

        .msg { max-width: 85%; padding: 10px 15px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.bot { 
            align-self: flex-start; 
            background: #f0f0f0; 
            color: #333; 
            border-radius: 15px 15px 15px 2px; 
        }

        .msg.user { 
            align-self: flex-end; 
            background: var(--coral); 
            color: white; 
            border-radius: 15px 15px 2px 15px; 
        }

        /* 文字強調 */
        .h-gold { color: var(--clay); font-weight: bold; }
        .h-teal { color: #2D7D7A; font-weight: bold; } /* 保持原圖中的深青色點綴 */

        /* 選項按鈕 */
        .opt-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; align-self: flex-start; padding-left: 20px;}
        .opt-btn { 
            padding: 6px 14px; border: 1px solid var(--coral); 
            color: var(--coral); border-radius: 20px; 
            cursor: pointer; font-size: 13px; background: white; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--coral); color: white; }

        /* 輸入區域 */
        .chat-input-wrap { display: flex; padding: 15px; border-top: 1px solid #eee; background: white; gap: 10px; }
        .chat-input-wrap input { flex: 1; padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .chat-send-btn { 
            background: var(--coral); color: white; border: none; 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h1>黃如璠 <span class="highlight">Jufan Huang</span></h1>
            <p class="subtitle">AI Solution Designer × Marketing Strategist</p>
        </div>
        <a href="resume.pdf" target="_blank" class="resume-btn-link">
            <button class="header-resume-btn">Resume 📄</button>
        </a>
    </div>

    <div class="bento-grid">
        <div class="card featured" onclick="show('chat')">
            <h3>AI 產品願景與藍圖規劃 🎯</h3>
            <p>點擊體驗：從 0 到 1 的「家用淨水器 Agent」互動對話實測，展現邏輯與體驗設計能力。</p>
        </div>
        <div class="card" onclick="show('ux')"><h3>用戶體驗架構 🧠</h3><p>直覺、流暢的對話設計與 Fallback 機制。</p></div>
        <div class="card" onclick="show('biz')"><h3>商業需求洞察 📈</h3><p>精準拆解業務痛點，轉化為具體技術需求。</p></div>
        <div class="card" onclick="show('data')"><h3>數據驅動優化 📊</h3><p>日誌分析與 A/B Testing，持續提升轉化效能。</p></div>
        <div class="card" onclick="show('growth')"><h3>整合行銷增長 🚀</h3><p>串聯社群媒體與自動化行銷閉環。</p></div>
        <div class="card" onclick="show('e2e')"><h3>端對端專案推進 🛠️</h3><p>橋接開發、設計與業務，確保專案完美落地。</p></div>
    </div>

    <div id="detail-panel">
        <div id="inner" class="detail-box"></div>
    </div>

    <script>
        // 保持原本的邏輯，只有文字小調
        let userName = "";
        let chatStep = 0;

        const info = {
            chat: `
                <h2 style="color:var(--coral);text-align:center;margin-bottom:20px;">Agent 對話實測展示</h2>
                <div class="chat-ui">
                    <div id="chat-flow"></div>
                    <div class="chat-input-wrap">
                        <input type="text" id="chat-input" placeholder="請先輸入您的稱呼..." onkeypress="if(event.key==='Enter') handleChat()">
                        <button class="chat-send-btn" onclick="handleChat()">發送</button>
                    </div>
                </div>
            `,
            // 下方資訊改為更符合履歷的正式描述
            ux: `<h2>用戶體驗架構 🧠</h2><ul><li><b>Persona 設定：</b> 建立具備品牌溫度的對話語氣。</li><li><b>Fallback 機制：</b> 確保 AI 無法回答時能優雅引導至真人或知識庫，覆蓋 90% 預約人次。</li></ul>`,
            biz: `<h2>商業需求洞察 📈</h2><ul><li><b>需求轉化：</b> 將模糊的營運難題拆解為清晰的技術規格。</li><li><b>效益評估：</b> 預估對話機器人對業務轉化率的實質貢獻。</li></ul>`,
            data: `<h2>數據驅動優化 📊</h2><ul><li><b>日誌分析：</b> 定期檢視對話 Log，找出跳出點進行腳本迭代。</li><li><b>A/B Testing：</b> 測試不同導購語句對轉化率的影響。</li></ul>`,
            growth: `<h2>整合行銷增長 🚀</h2><ul><li><b>自動化閉環：</b> 串聯廣告點擊到對話導購，降低開發客戶成本。</li><li><b>品牌影響力：</b> 運用 KOL 合作與內容行銷，帶動品牌持續影響力。</li></ul>`,
            e2e: `<h2>端對端專案推進 🛠️</h2><ul><li><b>跨維度溝通：</b> 確保工程、UI/UX 設計與業務端目標一致。</li><li><b>全生命週期管理：</b> 從需求、提案、開發到上線後的維運與優化。</li></ul>`
        };

        function show(key) {
            const panel = document.getElementById('detail-panel');
            const inner = document.getElementById('inner');
            inner.innerHTML = info[key];
            panel.style.display = 'block';

            if (key === 'chat') {
                resetChat();
            }

            setTimeout(() => { 
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); 
            }, 100);
        }

        // --- Chatbot 邏輯 (記住名字) ---
        function resetChat() {
            chatStep = 0;
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = "";
            appendMsg("bot", "您好！我是您的智慧助手。在開始前，請問該如何稱呼您呢？");
        }

        function handleChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            appendMsg("user", text);
            input.value = "";

            setTimeout(() => {
                if (chatStep === 0) {
                    userName = text;
                    appendMsg("bot", `好的，<span class="h-teal">${userName}</span>！很高興為您服務。`);
                    setTimeout(() => {
                        appendMsg("bot", "嗨～我是智能助理，有任何問題都能問我喔！");
                        chatStep = 1;
                    }, 800);
                } else if (chatStep === 1) {
                    // 模擬舊對話流程
                    appendMsg("bot", `您好！家用型濾芯建議每 <span class="h-gold">6 個月</span> 更換一次，才能確保過濾重金屬與餘氯的效果喔！💧`);
                    setTimeout(() => {
                        appendMsg("bot", `您目前使用的是【極淨系列 A1】嗎？現在「長效濾芯 3 入組」有首購優惠，平均一顆只要 <span class="h-gold">$450</span>，要幫您確認庫存嗎？`);
                        appendOptions([
                            { t: "好啊，請幫我確認。", a: () => handleAction("confirm") },
                            { t: "不用了，謝謝。", a: () => handleAction("cancel") }
                        ]);
                    }, 1000);
                    chatStep = 2;
                }
            }, 600);
        }

        function handleAction(type) {
            if (type === 'confirm') {
                appendMsg("user", "好啊，請幫我確認。");
                setTimeout(() => {
                    appendMsg("bot", `沒問題，庫存充足！${userName}，建議您現在點擊下方按鈕加入「水質守護會員」，我們會自動為您記錄「安裝日期」，並在效能下降前主動提醒您更換。🎁`);
                    setTimeout(() => {
                        appendMsg("bot", "歡迎加入！「水質守護計畫」已啟動。<br><br>系統已設好提醒，我們 6 個月後見！✨");
                    }, 1200);
                }, 800);
            } else {
                appendMsg("user", "不用了，謝謝。");
                appendMsg("bot", "好的，沒問題！若有其他需要隨時找我。");
            }
        }

        // --- 輔助函式 ---
        function appendMsg(role, text) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight; // 自動滾動到底部
        }

        function appendOptions(opts) {
            const flow = document.getElementById('chat-flow');
            const group = document.createElement("div");
            group.className = "opt-group";
            opts.forEach(o => {
                const btn = document.createElement("div");
                btn.className = "opt-btn";
                btn.innerText = o.t;
                btn.onclick = o.a;
                group.appendChild(btn);
            });
            flow.appendChild(group);
            flow.scrollTop = flow.scrollHeight;
        }
    </script>
</body>
</html>
